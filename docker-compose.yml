services:
  postgres:
    image: postgres:16
    container_name: vigia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vigia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vigia}
      POSTGRES_DB: ${POSTGRES_DB:-vigia}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - vigia_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-vigia}']
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: vigia-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@vigia.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-vigia}
    ports:
      - '${PGADMIN_PORT:-5050}:80'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - vigia_pgadmin_data:/var/lib/pgadmin

  backend:
    build:
      context: ./backend
    container_name: vigia-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-vigia}:${POSTGRES_PASSWORD:-vigia}@postgres:5432/${POSTGRES_DB:-vigia}?schema=public
      JWT_SECRET: ${JWT_SECRET:-troque-por-um-segredo-forte-em-producao}
      PORT: 3000
      FRONTEND_URL: http://localhost:${FRONTEND_PORT:-5173}
      # Cofre de segredos (RF-004) — cifra o Access Token da Meta.
      # Gere a sua com: openssl rand -hex 32
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:-68f43863f739e20d6390b790c22520411db09a98830ad586146e19b830711ad3}
      META_API_VERSION: ${META_API_VERSION:-v21.0}
    ports:
      - '${BACKEND_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - vigia_backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: vigia-frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-3000}/api/v1
    ports:
      - '${FRONTEND_PORT:-5173}:5173'
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - vigia_frontend_node_modules:/app/node_modules

volumes:
  vigia_postgres_data:
  vigia_pgadmin_data:
  vigia_backend_node_modules:
  vigia_frontend_node_modules:
